<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpeakClear | Master Your Verbal Clarity</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Navigation -->
<header class="sticky top-0 z-50 w-full border-b border-slate-200 dark:border-slate-800 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="bg-primary p-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-2xl">graphic_eq</span>
</div>
<h2 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">SpeakClear</h2>
</div>
<nav class="hidden md:flex items-center gap-10">
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Features</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Pricing</a>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">About</a>
</nav>
<div class="flex items-center gap-4">
<button class="hidden sm:block text-sm font-semibold px-4 py-2" onclick="window.location.href='/login'">Log in</button>
<button class="bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-lg text-sm font-bold transition-all shadow-lg shadow-primary/20" onclick="window.location.href='/login'">
                    Get Started
                </button>
</div>
</div>
</header>
<main class="flex-1">
<!-- Hero Section -->
<section class="relative pt-12 pb-24 px-6">
<div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
<div class="flex flex-col gap-8">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 border border-primary/20 w-fit">
<span class="material-symbols-outlined text-primary text-sm">auto_awesome</span>
<span class="text-xs font-bold uppercase tracking-wider text-primary">New AI Analysis V2.0</span>
</div>
<div class="flex flex-col gap-6">
<h1 class="text-5xl lg:text-7xl font-black leading-tight tracking-tight text-slate-900 dark:text-white">
                            Master Your Verbal Clarity with <span class="text-primary">AI Analysis</span>
</h1>
<p class="text-lg lg:text-xl text-slate-600 dark:text-slate-400 max-w-xl leading-relaxed">
                            SpeakClear identifies thinking gaps, tracks filler words, and refines your professional tone using advanced voice-based intelligence.
                        </p>
</div>
<div class="flex flex-col sm:flex-row gap-4">
<button class="bg-primary hover:bg-primary/90 text-white px-8 py-4 rounded-xl text-lg font-bold transition-all flex items-center justify-center gap-2 group shadow-xl shadow-primary/20" onclick="window.location.href='/login'">
                            Start Analyzing Now
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<button class="border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800 px-8 py-4 rounded-xl text-lg font-bold transition-all">
                            View Demo
                        </button>
</div>
</div>
</div>
</section>
</main>
</body></html>

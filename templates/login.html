<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SpeakClear - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13a4ec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101c22",
                        "surface-dark": "#192b33",
                        "border-dark": "#325567",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="flex items-center justify-between border-b border-slate-200 dark:border-border-dark px-6 md:px-10 py-3 bg-white dark:bg-background-dark/50 backdrop-blur-md sticky top-0 z-50">
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight">SpeakClear</h2>
<div class="hidden md:flex flex-1 justify-end gap-8">
<a class="text-slate-600 dark:text-slate-300 hover:text-primary text-sm font-medium" href="/">Home</a>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-4 relative overflow-hidden">
<div class="w-full max-w-[480px] z-10">
<div class="bg-white dark:bg-background-dark border border-slate-200 dark:border-border-dark rounded-xl shadow-2xl p-8 md:p-10">
<div class="text-center mb-10">
<h1 class="text-3xl font-bold mb-2" id="form-title">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm" id="form-subtitle">Sign in to continue your verbal analysis journey.</p>
</div>
<form id="auth-form" class="space-y-5">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold">Username</label>
<input id="username" name="username" class="w-full rounded-lg border border-slate-200 dark:border-border-dark bg-slate-50 dark:bg-surface-dark px-4 py-3 text-slate-900 dark:text-white" placeholder="Username" type="text" required />
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold">Password</label>
<input id="password" name="password" class="w-full rounded-lg border border-slate-200 dark:border-border-dark bg-slate-50 dark:bg-surface-dark px-4 py-3 text-slate-900 dark:text-white" placeholder="Enter your password" type="password" required />
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg mt-2" type="submit" id="submit-btn" data-mode="login">
                        Sign In
                    </button>
<p id="error-msg" class="text-red-500 text-sm text-center mt-2 hidden"></p>
</form>
<div class="mt-8 text-center" id="toggle-auth">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                        Don't have an account? 
                        <a href="javascript:toggleMode()" class="text-primary font-bold hover:underline">Sign up for free</a>
</p>
</div>
</div>
</div>
</main>
<script>
    function toggleMode() {
        const btn = document.getElementById("submit-btn");
        const mode = btn.getAttribute("data-mode");
        const title = document.getElementById("form-title");
        const subtitle = document.getElementById("form-subtitle");
        const toggle = document.getElementById("toggle-auth");
        const error = document.getElementById("error-msg");

        error.classList.add("hidden");

        if (mode === "login") {
            btn.setAttribute("data-mode", "register");
            btn.innerText = "Register Now";
            title.innerText = "Create an Account";
            subtitle.innerText = "Start analyzing your verbal clarity today.";
            toggle.innerHTML = `<p class="text-slate-500 dark:text-slate-400 text-sm">Already have an account? <a href="javascript:toggleMode()" class="text-primary font-bold hover:underline">Sign in</a></p>`;
        } else {
            btn.setAttribute("data-mode", "login");
            btn.innerText = "Sign In";
            title.innerText = "Welcome Back";
            subtitle.innerText = "Sign in to continue your verbal analysis journey.";
            toggle.innerHTML = `<p class="text-slate-500 dark:text-slate-400 text-sm">Don't have an account? <a href="javascript:toggleMode()" class="text-primary font-bold hover:underline">Sign up for free</a></p>`;
        }
    }

    document.getElementById("auth-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const mode = document.getElementById("submit-btn").getAttribute("data-mode");
        const formData = new FormData(e.target);
        const endpoint = mode === "login" ? "/api/login" : "/api/register";
        const errorMsg = document.getElementById("error-msg");
        
        try {
            const response = await fetch(endpoint, {
                method: "POST",
                body: formData
            });
            const data = await response.json();
            
            if (!response.ok) {
                errorMsg.innerText = data.detail || "An error occurred.";
                errorMsg.classList.remove("hidden");
            } else {
                localStorage.setItem("username", formData.get("username"));
                window.location.href = "/assessment";
            }
        } catch (err) {
            errorMsg.innerText = "Network error. Make sure server is running.";
            errorMsg.classList.remove("hidden");
        }
    });
</script>
</body></html>
